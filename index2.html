<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soccer Goalie Block Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0b6623;
        font-family: Arial, sans-serif;
    }

    #field {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(#0b6623, #0a5a1f);
    }

    #goal {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 375px;
        height: 100px;
        border: 4px solid white;
        border-bottom: none;
    }

    #goalie {
        position: absolute;
        bottom: 120px;
        width: 80px;
        height: 20px;
        background: white;
        border-radius: 10px;
    }

    #ball {
        position: absolute;
        width: 25px;
        height: 25px;
        background: white;
        border-radius: 50%;
    }

    #message {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 40px;
        color: white;
        display: none;
    }

    #score {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 20px;
    }
</style>
</head>
<body>

<div id="field">
    <div id="goal"></div>
    <div id="goalie"></div>
    <div id="ball"></div>
    <div id="message">You Win! 🏆</div>
    <div id="score"></div>
</div>

<script>
const field = document.getElementById("field");
const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const message = document.getElementById("message");
const scoreDisplay = document.getElementById("score");

let fieldWidth = field.clientWidth;
const goalieWidth = 80;

let goalieX = fieldWidth / 2 - goalieWidth / 2;

let ballX = 0;
let ballY = 0;
let dx = 0;
let dy = 0;

let saves = 0;
let gameOver = false;
let shotResolved = false;

function updateScore() {
    scoreDisplay.textContent = saves + " / 3 Saves";
}
updateScore();

goalie.style.left = goalieX + "px";

function getGoalBounds() {
    const center = field.clientWidth / 2;
    const width = 375;
    return {
        left: center - width / 2,
        right: center + width / 2
    };
}

// wheel control
document.addEventListener("wheel", (e) => {
    if (gameOver) return;

    e.preventDefault();

    if (e.deltaY > 0) goalieX -= 30;
    else goalieX += 30;

    goalieX = Math.max(0, Math.min(fieldWidth - goalieWidth, goalieX));
    goalie.style.left = goalieX + "px";
}, { passive: false });

window.addEventListener("resize", () => {
    fieldWidth = field.clientWidth;
});

function spawnBall() {
    const bounds = getGoalBounds();

    ballX = bounds.left + Math.random() * (bounds.right - bounds.left - 25);
    ballY = 0;

    dx = (Math.random() - 0.5) * 3;
    dy = 3 + Math.random() * 2;

    shotResolved = false;

    ball.style.left = ballX + "px";
    ball.style.top = ballY + "px";
}

function update() {
    if (gameOver) return;

    const goalieRect = goalie.getBoundingClientRect();
    const ballRect = ball.getBoundingClientRect();

    const bounds = getGoalBounds();

    ballX += dx;
    ballY += dy;

    dx += (Math.random() - 0.5) * 0.1;
    dx = Math.max(-3, Math.min(3, dx));

    ball.style.left = ballX + "px";
    ball.style.top = ballY + "px";

    // SAVE
    if (!shotResolved &&
        ballRect.bottom >= goalieRect.top &&
        ballRect.left < goalieRect.right &&
        ballRect.right > goalieRect.left
    ) {
        shotResolved = true;
        saves++;
        updateScore();

        message.textContent = "Great Save! 🧤";
        message.style.display = "block";

        if (saves >= 3) {
            gameOver = true;
            message.textContent = "You Win! 🏆";
            return;
        }

        setTimeout(() => {
            message.style.display = "none";
            spawnBall();
        }, 600);
    }

    // MISS
    if (!shotResolved && ballY > window.innerHeight) {
        shotResolved = true;

        message.textContent = "Missed! ⚽";
        message.style.display = "block";

        setTimeout(() => {
            message.style.display = "none";
            spawnBall();
        }, 600);
    }

    requestAnimationFrame(update);
}

spawnBall();
update();
</script>

</body>
</html>
