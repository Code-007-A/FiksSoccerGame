<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
  body {
    margin: 0;
    background: #0b6623;
    overflow: hidden;
  }

  /* GOAL (50% wider) */
  .goal {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 480px;   /* was 320px → +50% wider */
    height: 140px;
    border: 4px solid white;
  }

  #goalie {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    transition: left 0.08s linear;
  }

  #ball {
    position: absolute;
    width: 35px;
    height: 35px;
  }

  #message {
    position: absolute;
    top: 200px;
    width: 100%;
    text-align: center;
    font-size: 28px;
    color: white;
    font-family: Arial;
  }
</style>
</head>

<body>

<div class="goal"></div>

<img id="goalie" src="goalie.png" alt="Goalie">
<img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" alt="Ball">

<div id="message"></div>

<script>

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const message = document.getElementById("message");

// mouse control
document.addEventListener("mousemove", (e) => {
  let x = e.clientX;

  const min = 80;
  const max = window.innerWidth - 80;

  if (x < min) x = min;
  if (x > max) x = max;

  goalie.style.left = x + "px";
});

// get goal boundaries
function getGoalBounds() {
  const goal = document.querySelector(".goal").getBoundingClientRect();
  return {
    left: goal.left,
    right: goal.right,
    top: goal.top
  };
}

// SHOOT BALL WITH RANDOM ANGLE BUT STILL INSIDE GOAL
function shootBall() {
  const goal = getGoalBounds();

  let x = window.innerWidth / 2;
  let y = window.innerHeight - 50;

  ball.style.left = x + "px";
  ball.style.top = y + "px";

  // pick random target INSIDE goal width
  const targetX = goal.left + Math.random() * (goal.right - goal.left);

  // add slight randomness in curve
  const drift = (Math.random() - 0.5) * 3;

  let speedY = 8;
  let speedX = (targetX - x) / 60 + drift;

  const interval = setInterval(() => {

    y -= speedY;
    x += speedX;

    ball.style.top = y + "px";
    ball.style.left = x + "px";

    const goalieRect = goalie.getBoundingClientRect();
    const ballRect = ball.getBoundingClientRect();

    // SAVE CHECK
    const hit =
      ballRect.top <= goalieRect.bottom &&
      ballRect.left < goalieRect.right &&
      ballRect.right > goalieRect.left;

    if (hit) {
      clearInterval(interval);
      message.textContent = "🧤 SAVE!";
      resetBall();
      setTimeout(shootBall, 1000);
    }

    // GOAL CHECK (inside posts)
    if (y <= goal.top) {
      if (x > goal.left && x < goal.right) {
        clearInterval(interval);
        message.textContent = "⚽ GOAL!";
      } else {
        clearInterval(interval);
        message.textContent = "❌ MISS!";
      }

      resetBall();
      setTimeout(shootBall, 1000);
    }

  }, 20);
}

function resetBall() {
  ball.style.top = "";
  message.textContent = "";
}

// start game
shootBall();

</script>

</body>
</html>
