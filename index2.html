<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
  body {
    margin: 0;
    background: #0b6623;
    overflow: hidden;
    font-family: Arial;
  }

  .goal {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 160px;
    border: 4px solid white;
  }

  #goalie {
    position: absolute;
    top: 70px;
    width: 120px;
    transform: translateX(-50%);
  }

  #ball {
    position: absolute;
    width: 35px;
    height: 35px;
  }

  #message {
    position: absolute;
    top: 200px;
    width: 100%;
    text-align: center;
    font-size: 36px;
    color: white;
  }

  #counter {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    color: white;
  }

  .confetti {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 12px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
    }
  }
</style>
</head>

<body>

<div class="goal"></div>

<img id="goalie" src="goalie.png">
<img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

<div id="message"></div>
<div id="counter">Saves: 0/3</div>

<script>

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const goal = document.querySelector(".goal");
const message = document.getElementById("message");
const counterText = document.getElementById("counter");

let saves = 0;
let gameActive = true;
let goalieX = window.innerWidth / 2;

// ⚽ GET GOAL BOUNDARIES
function getGoalBounds() {
  return goal.getBoundingClientRect();
}

// 🧤 INIT POSITION
function updateGoaliePosition(x) {
  const bounds = getGoalBounds();

  const goalieWidth = 120;

  // 🚫 LEFT POST LIMIT
  const minX = bounds.left + goalieWidth / 2;

  // 🚫 RIGHT POST LIMIT
  const maxX = bounds.right - goalieWidth / 2;

  // clamp inside goal
  goalieX = Math.max(minX, Math.min(maxX, x));

  goalie.style.left = goalieX + "px";
}

// 🎮 SCROLL CONTROL (LEFT / RIGHT ONLY INSIDE GOAL)
window.addEventListener("wheel", (e) => {
  const speed = 25;

  if (e.deltaY > 0) {
    goalieX -= speed;
  } else {
    goalieX += speed;
  }

  updateGoaliePosition(goalieX);
});

// initialize goalie inside goal
window.onload = () => {
  const bounds = getGoalBounds();
  goalieX = (bounds.left + bounds.right) / 2;
  updateGoaliePosition(goalieX);

  shootBall();
};

// 🧠 GOAL LOGIC
function getGoal() {
  return document.querySelector(".goal").getBoundingClientRect();
}

function showSaveMessage() {
  message.textContent = "🧤 SAVED";
  setTimeout(() => message.textContent = "", 1000);
}

// 🎉 CONFETTI
function spawnConfetti() {
  for (let i = 0; i < 80; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.background = Math.random() > 0.5 ? "black" : "white";
    c.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ⚽ BALL
function shootBall() {
  if (!gameActive) return;

  const goal = getGoal();

  let x = window.innerWidth / 2;
  let y = window.innerHeight - 60;

  ball.style.opacity = "1";

  const minX = goal.left + 10;
  const maxX = goal.right - 10;
  const targetX = minX + Math.random() * (maxX - minX);

  let speedY = 25;
  let speedX = (targetX - x) / 60;

  const interval = setInterval(() => {

    y -= speedY;
    x += speedX;

    ball.style.top = y + "px";
    ball.style.left = x + "px";

    const ballRect = ball.getBoundingClientRect();
    const goalieRect = goalie.getBoundingClientRect();

    const goalieFeetLine = goalieRect.bottom;

    const beforeFeet = ballRect.bottom < goalieFeetLine;

    const touching =
      ballRect.left < goalieRect.right &&
      ballRect.right > goalieRect.left;

    if (beforeFeet && touching) {
      clearInterval(interval);

      saves++;
      counterText.textContent = `Saves: ${saves}/3`;

      showSaveMessage();

      ball.style.opacity = "0";

      if (saves >= 3) {
        gameActive = false;
        message.textContent = "🎉 Happy Birthday, Fiks!";
        spawnConfetti();
      }

      setTimeout(shootBall, 900);
      return;
    }

    if (y <= goal.top) {
      clearInterval(interval);
      ball.style.opacity = "0";
      setTimeout(shootBall, 900);
    }

  }, 20);
}

</script>

</body>
</html>
