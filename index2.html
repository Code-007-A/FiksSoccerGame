<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
  body {
    margin: 0;
    background: #0b6623;
    overflow: hidden;
    font-family: Arial;
  }

  .goal {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 160px;
    border: 4px solid white;
  }

  /* 🧤 40% WIDER GOALIE */
  #goalie {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 168px; /* 120px → +40% = 168px */
  }

  #ball {
    position: absolute;
    width: 35px;
    height: 35px;
  }

  #message {
    position: absolute;
    top: 200px;
    width: 100%;
    text-align: center;
    font-size: 36px;
    color: white;
  }

  #counter {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    color: white;
  }

</style>
</head>

<body>

<div class="goal"></div>

<img id="goalie" src="goalie.png">
<img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

<div id="message"></div>
<div id="counter">Saves: 0/3</div>

<script>

const goalie = document.getElementById("goalie");
const goal = document.querySelector(".goal");

let goalieX = window.innerWidth / 2;

// 🧠 GET GOAL BOUNDS
function getGoalBounds() {
  return goal.getBoundingClientRect();
}

// 🧤 UPDATE POSITION (LOCKED INSIDE POSTS)
function moveGoalie(x) {
  const bounds = getGoalBounds();

  const goalieWidth = goalie.offsetWidth;

  // 🚫 LEFT POST LIMIT
  const minX = bounds.left + goalieWidth / 2;

  // 🚫 RIGHT POST LIMIT
  const maxX = bounds.right - goalieWidth / 2;

  goalieX = Math.max(minX, Math.min(maxX, x));

  goalie.style.left = goalieX + "px";
}

// 🎮 SCROLL CONTROL
window.addEventListener("wheel", (e) => {
  const speed = 25;

  if (e.deltaY > 0) {
    goalieX -= speed;
  } else {
    goalieX += speed;
  }

  moveGoalie(goalieX);
});

// INIT POSITION
window.onload = () => {
  const bounds = getGoalBounds();
  goalieX = (bounds.left + bounds.right) / 2;

  moveGoalie(goalieX);
};

</script>

</body>
</html>
