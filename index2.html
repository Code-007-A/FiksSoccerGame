<script>

// 🔊 SOUND 01 (save sound)
const saveSound = new Audio();
saveSound.src = "sound01.mp3";
saveSound.preload = "auto";
saveSound.volume = 1.0;

// 🎉 SOUND 02 (WIN MUSIC LOOP)
const winSound = new Audio();
winSound.src = "sound02.mp3";
winSound.preload = "auto";
winSound.volume = 1.0;
winSound.loop = true;

const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const goal = document.querySelector(".goal");

const counterText = document.getElementById("counter");
const message = document.getElementById("message");

const restartBtn = document.getElementById("restartBtn");

let saves = 0;
let gameActive = false;

let goalieX = window.innerWidth / 2;

let jumpAnim = null;

// 🧠 GOAL BOUNDS
function getGoalBounds() {
  return goal.getBoundingClientRect();
}

// 🧤 MOUSE CONTROL
window.addEventListener("mousemove", (e) => {

  if (!gameActive) return;

  const bounds = getGoalBounds();

  const goalieWidth = goalie.offsetWidth;

  const minX = bounds.left + goalieWidth / 2;
  const maxX = bounds.right - goalieWidth / 2;

  let x = e.clientX;

  goalieX = Math.max(minX, Math.min(maxX, x));

  goalie.style.left = goalieX + "px";

});

// ⚽ RESET BALL
function resetBall() {

  ball.style.opacity = "0";

  ball.style.left = window.innerWidth / 2 + "px";

  ball.style.top = window.innerHeight - 60 + "px";

}

// 🧤 COLLISION
function checkGoalieHit(ballRect, goalieRect) {

  const ballCenterX =
    (ballRect.left + ballRect.right) / 2;

  const ballCenterY =
    (ballRect.top + ballRect.bottom) / 2;

  return (
    ballCenterX > goalieRect.left &&
    ballCenterX < goalieRect.right &&
    ballCenterY > goalieRect.top &&
    ballCenterY < goalieRect.bottom
  );
}

// 🧤 JUMP
function startJump() {

  if (jumpAnim) return;

  jumpAnim = setInterval(() => {

    goalie.src =
      goalie.src.includes("goalie.png")
        ? "jump.png"
        : "goalie.png";

  }, 400);

}

function stopJump() {

  clearInterval(jumpAnim);

  jumpAnim = null;

  goalie.src = "goalie.png";

}

// 🎉 CONFETTI
function launchConfetti() {

  for (let i = 0; i < 120; i++) {

    const c = document.createElement("div");

    c.classList.add("confetti");

    c.style.background =
      Math.random() > 0.5 ? "black" : "white";

    c.style.left =
      Math.random() * window.innerWidth + "px";

    document.body.appendChild(c);

    let y = -30;

    let x = parseFloat(c.style.left);

    let drift = (Math.random() - 0.5) * 4;

    let speed = Math.random() * 4 + 2;

    const fall = setInterval(() => {

      y += speed;

      x += drift;

      c.style.top = y + "px";

      c.style.left = x + "px";

      if (y > window.innerHeight) {

        clearInterval(fall);

        c.remove();

      }

    }, 20);

  }

}

// ⚽ SHOOT BALL
function shootBall() {

  if (!gameActive) return;

  const goalRect = getGoalBounds();

  let x =
    window.innerWidth * (0.2 + Math.random() * 0.6);

  let y = window.innerHeight - 60;

  ball.style.opacity = "1";

  const targetX =
    goalRect.left + Math.random() * goalRect.width;

  let velocityX = 0;

  let speedY =
    window.innerHeight * 0.018;

  const interval = setInterval(() => {

    velocityX +=
      (targetX > x ? 1 : -1) * 0.3;

    x += velocityX;

    y -= speedY;

    ball.style.left = x + "px";

    ball.style.top = y + "px";

    const ballRect =
      ball.getBoundingClientRect();

    const goalieRect =
      goalie.getBoundingClientRect();

    // 🧤 SAVE
    if (checkGoalieHit(ballRect, goalieRect)) {

      clearInterval(interval);

      saveSound.currentTime = 0;
      saveSound.play().catch(() => {});

      saves++;

      counterText.textContent =
        `Saves: ${saves}/3`;

      // 🏆 WIN CONDITION
      if (saves >= 3) {

        gameActive = false;

        message.textContent =
          "YOU WIN!!! Happy Birthday, Fiks!";

        restartBtn.style.display = "block";

        startJump();
        launchConfetti();

        // 🔊 PLAY WIN SOUND LOOP
        winSound.currentTime = 0;
        winSound.play().catch(() => {});

        return;
      }

      ball.style.opacity = "0";

      setTimeout(shootBall, 700);

      return;
    }

    // ❌ MISS
    if (y <= goalRect.top - 50) {

      clearInterval(interval);

      ball.style.opacity = "0";

      setTimeout(shootBall, 700);

    }

  }, 16);

}

// ▶ START
startBtn.onclick = () => {

  // unlock audio
  saveSound.play().then(() => {
    saveSound.pause();
    saveSound.currentTime = 0;
  });

  winSound.play().then(() => {
    winSound.pause();
    winSound.currentTime = 0;
  });

  startScreen.style.display = "none";

  saves = 0;

  gameActive = true;

  counterText.textContent = "Saves: 0/3";

  message.textContent = "";

  restartBtn.style.display = "none";

  resetBall();

  shootBall();

};

// 🔄 RESTART
restartBtn.onclick = () => {

  gameActive = false;

  startScreen.style.display = "flex";

  saves = 0;

  counterText.textContent = "Saves: 0/3";

  message.textContent = "";

  restartBtn.style.display = "none";

  stopJump();

  winSound.pause();
  winSound.currentTime = 0;

  resetBall();

};

// INIT
window.onload = resetBall;

</script>
