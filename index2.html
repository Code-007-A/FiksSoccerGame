<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
body {
  margin: 0;
  background: #0b6623;
  overflow: hidden;
  font-family: Arial;
}

.goal {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 160px;
  border: 4px solid white;
}

#goalie {
  position: absolute;
  top: 70px;
  width: 168px;
  transform: translateX(-50%);
}

#ball {
  position: absolute;
  width: 35px;
  height: 35px;
}

#message {
  position: absolute;
  top: 200px;
  width: 100%;
  text-align: center;
  font-size: 36px;
  color: white;
}

#counter {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 22px;
  color: white;
}

#restartBtn {
  position: absolute;
  top: 280px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 20px;
  font-size: 18px;
  display: none;
  cursor: pointer;
}

.confetti {
  position: absolute;
  top: -20px;
  width: 8px;
  height: 12px;
  animation: fall linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}
</style>
</head>

<body>

<div class="goal"></div>

<img id="goalie" src="goalie.png">
<img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

<div id="message"></div>
<div id="counter">Saves: 0/3</div>

<button id="restartBtn">Start Over</button>

<script>

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const goal = document.querySelector(".goal");
const counterText = document.getElementById("counter");
const message = document.getElementById("message");
const restartBtn = document.getElementById("restartBtn");

let saves = 0;
let gameActive = true;
let goalieX = window.innerWidth / 2;

// 🧠 GOAL BOUNDS
function getGoalBounds() {
  return goal.getBoundingClientRect();
}

// 🧤 GOALIE MOVE (LOCKED)
function moveGoalie(x) {
  const bounds = getGoalBounds();
  const goalieWidth = goalie.offsetWidth;

  const minX = bounds.left + goalieWidth / 2;
  const maxX = bounds.right - goalieWidth / 2;

  goalieX = Math.max(minX, Math.min(maxX, x));
  goalie.style.left = goalieX + "px";
}

// 🎮 SCROLL CONTROL
window.addEventListener("wheel", (e) => {
  if (!gameActive) return;

  const speed = 25;
  goalieX += (e.deltaY > 0) ? -speed : speed;
  moveGoalie(goalieX);
});

// 🎉 CONFETTI
function spawnConfetti() {
  for (let i = 0; i < 80; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.background = Math.random() > 0.5 ? "black" : "white";
    c.style.animationDuration = (2 + Math.random() * 3) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// ⚽ RESET BALL (IMPORTANT FIX)
function resetBall() {
  ball.style.transition = "none";
  ball.style.opacity = "0";
  ball.style.left = window.innerWidth / 2 + "px";
  ball.style.top = window.innerHeight - 60 + "px";
}

// ⚽ SHOOT BALL
function shootBall() {
  if (!gameActive) return;

  const goalRect = getGoalBounds();

  const startZones = [
    window.innerWidth * 0.2,
    window.innerWidth * 0.5,
    window.innerWidth * 0.8
  ];

  let x = startZones[Math.floor(Math.random() * startZones.length)];
  let y = window.innerHeight - 60;

  ball.style.opacity = "1";

  const targetX =
    goalRect.left + 20 +
    Math.random() * (goalRect.width - 40);

  let speedY = 9;
  let curve = (Math.random() * 0.6 + 0.4);
  let direction = targetX > x ? 1 : -1;
  let velocityX = 0;

  const interval = setInterval(() => {

    velocityX += direction * curve * 0.2;

    x += velocityX;
    y -= speedY;

    ball.style.top = y + "px";
    ball.style.left = x + "px";

    const ballRect = ball.getBoundingClientRect();
    const goalieRect = goalie.getBoundingClientRect();

    const beforeFeet = ballRect.bottom < goalieRect.bottom;

    const touching =
      ballRect.left < goalieRect.right &&
      ballRect.right > goalieRect.left;

    // 🧤 SAVE
    if (beforeFeet && touching) {
      clearInterval(interval);

      saves++;
      counterText.textContent = `Saves: ${saves}/3`;

      // 🏆 WIN
      if (saves >= 3) {
        gameActive = false;

        const g = goalieRect;

        ball.style.transition = "0.3s ease";
        ball.style.top = (g.top + 20) + "px";
        ball.style.left = (g.left + g.width / 2 - 10) + "px";

        message.textContent = "🎉 Happy Birthday, Fiks!";
        spawnConfetti();

        setTimeout(() => {
          restartBtn.style.display = "block";
        }, 1000);

        return;
      }

      // 🔄 BOUNCE SAVE
      let bounceY = 8;
      let bounceX = (Math.random() - 0.5) * 6;

      const bounce = setInterval(() => {
        y += bounceY;
        x += bounceX;

        ball.style.top = y + "px";
        ball.style.left = x + "px";

        if (y > window.innerHeight) {
          clearInterval(bounce);
          ball.style.opacity = "0";
          setTimeout(shootBall, 900);
        }

      }, 20);

      return;
    }

    // ❌ MISS
    if (y <= goalRect.top) {
      clearInterval(interval);
      ball.style.opacity = "0";
      setTimeout(shootBall, 900);
    }

  }, 20);
}

// 🔄 RESTART GAME (FULL RESET)
restartBtn.addEventListener("click", () => {
  saves = 0;
  gameActive = true;

  message.textContent = "";
  counterText.textContent = "Saves: 0/3";
  restartBtn.style.display = "none";

  const bounds = getGoalBounds();
  goalieX = (bounds.left + bounds.right) / 2;
  moveGoalie(goalieX);

  resetBall();

  setTimeout(() => {
    shootBall();
  }, 500);
});

// 🧠 INIT
window.onload = () => {
  const bounds = getGoalBounds();
  goalieX = (bounds.left + bounds.right) / 2;
  moveGoalie(goalieX);

  resetBall();

  setTimeout(() => {
    shootBall();
  }, 500);
};

</script>

</body>
</html>
