<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Game</title>

<style>
  body {
    margin: 0;
    background: #0b6623; /* field green */
    overflow: hidden;
  }

  /* Goal area */
  .goal {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 120px;
    border: 4px solid white;
  }

  /* Goalie image */
  #goalie {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    transition: left 0.1s linear;
  }
</style>
</head>

<body>

<!-- Goal frame -->
<div class="goal"></div>

<!-- Goalie -->
<img id="goalie" src="goalie.png" alt="Goalie">

<script>
  // Simple movement: follow mouse left/right
  const goalie = document.getElementById("goalie");

  document.addEventListener("mousemove", (e) => {
    let x = e.clientX;

    // keep within screen bounds
    const min = 60;
    const max = window.innerWidth - 60;

    if (x < min) x = min;
    if (x > max) x = max;

    goalie.style.left = x + "px";
  });
</script>

</body>
</html>
