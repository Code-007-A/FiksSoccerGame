<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
  body {
    margin: 0;
    background: #0b6623;
    overflow: hidden;
    font-family: Arial;
  }

  .goal {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 160px;
    border: 4px solid white;
  }

  #goalie {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
  }

  #ball {
    position: absolute;
    width: 35px;
    height: 35px;
  }

  #message {
    position: absolute;
    top: 200px;
    width: 100%;
    text-align: center;
    font-size: 36px;
    color: white;
  }

  #counter {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    color: white;
  }

  .confetti {
    position: absolute;
    top: -20px;
    width: 8px;
    height: 12px;
    animation: fall linear forwards;
  }

  @keyframes fall {
    to {
      transform: translateY(110vh) rotate(360deg);
    }
  }
</style>
</head>

<body>

<div class="goal"></div>

<img id="goalie" src="goalie.png">
<img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

<div id="message"></div>
<div id="counter">Saves: 0/3</div>

<script>

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const message = document.getElementById("message");
const counterText = document.getElementById("counter");

let saves = 0;
let gameActive = true;
let goalieX = window.innerWidth / 2;
let messageTimer = null;

goalie.style.left = goalieX + "px";

// scroll control
window.addEventListener("wheel", (e) => {
  const speed = 25;

  goalieX += (e.deltaY > 0) ? -speed : speed;

  const min = 80;
  const max = window.innerWidth - 80;

  goalieX = Math.max(min, Math.min(max, goalieX));

  goalie.style.left = goalieX + "px";
});

// goal bounds
function getGoal() {
  return document.querySelector(".goal").getBoundingClientRect();
}

// save message (1 sec)
function showSaveMessage() {
  message.textContent = "🧤 SAVED";

  clearTimeout(messageTimer);
  messageTimer = setTimeout(() => {
    message.textContent = "";
  }, 1000);
}

// confetti
function spawnConfetti() {
  for (let i = 0; i < 80; i++) {
    const c = document.createElement("div");
    c.className = "confetti";

    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.background = Math.random() > 0.5 ? "black" : "white";
    c.style.animationDuration = (2 + Math.random() * 3) + "s";

    document.body.appendChild(c);
    setTimeout(() => c.remove(), 5000);
  }
}

// BALL SHOOT
function shootBall() {
  if (!gameActive) return;

  const goal = getGoal();

  let x = window.innerWidth / 2;
  let y = window.innerHeight - 60;

  ball.style.opacity = "1";

  const padding = 10;
  const minX = goal.left + padding;
  const maxX = goal.right - padding;

  const targetX = minX + Math.random() * (maxX - minX);

  let speedY = 7;
  let speedX = (targetX - x) / 60;

  const interval = setInterval(() => {

    y -= speedY;
    x += speedX;

    ball.style.top = y + "px";
    ball.style.left = x + "px";

    const ballRect = ball.getBoundingClientRect();
    const goalieRect = goalie.getBoundingClientRect();
    const goal = getGoal();

    // 🔥 STRICT GOAL LINE (NO SAVE AFTER THIS)
    const goalLineY = goal.top + 40;

    const beforeGoalLine = ballRect.top > goalLineY;

    // ⭐ PIXEL-PERFECT SAVE CHECK (BOTTOM OF GOALIE)
    const goalieBottomTouchesBall =
      goalieRect.bottom >= ballRect.top &&
      goalieRect.top < ballRect.bottom;

    const insideWidth =
      ballRect.left < goalieRect.right &&
      ballRect.right > goalieRect.left;

    const validSave =
      beforeGoalLine &&
      goalieBottomTouchesBall &&
      insideWidth;

    if (validSave) {
      clearInterval(interval);

      saves++;
      counterText.textContent = `Saves: ${saves}/3`;

      showSaveMessage();

      ball.style.top = (y + 80) + "px";

      setTimeout(() => {
        ball.style.opacity = "0";
      }, 200);

      checkWin();

      setTimeout(shootBall, 900);
      return;
    }

    if (ballRect.top <= goal.top) {
      clearInterval(interval);
      ball.style.opacity = "0";
      setTimeout(shootBall, 900);
    }

  }, 20);
}

// WIN
function checkWin() {
  if (saves >= 3 && gameActive) {
    gameActive = false;

    counterText.textContent = "Saves: 3/3";
    message.textContent = "🎉 Happy Birthday, Fiks!";

    spawnConfetti();
  }
}

// start
window.onload = () => {
  shootBall();
};

</script>

</body>
</html>
