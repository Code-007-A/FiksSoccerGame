<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
  body {
    margin: 0;
    background: #0b6623;
    overflow: hidden;
    font-family: Arial;
  }

  .goal {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 1100px;
    height: 160px;
    border: 4px solid white;
  }

  /* 🧤 40% wider goalie */
  #goalie {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 75px;
  }

  #ball {
    position: absolute;
    width: 35px;
    height: 35px;
  }

  #message {
    position: absolute;
    top: 200px;
    width: 100%;
    text-align: center;
    font-size: 36px;
    color: white;
  }

  #counter {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    color: white;
  }
</style>
</head>

<body>

<div class="goal"></div>

<img id="goalie" src="goalie.png">
<img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

<div id="message"></div>
<div id="counter">Saves: 0/3</div>

<script>

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const goal = document.querySelector(".goal");
const counterText = document.getElementById("counter");
const message = document.getElementById("message");

let saves = 0;
let goalieX = window.innerWidth / 2;
let gameActive = true;

// 🧤 GOALIE LIMIT MOVEMENT
function getGoalBounds() {
  return goal.getBoundingClientRect();
}

function moveGoalie(x) {
  const bounds = getGoalBounds();
  const goalieWidth = goalie.offsetWidth;

  const minX = bounds.left + goalieWidth / 2;
  const maxX = bounds.right - goalieWidth / 2;

  goalieX = Math.max(minX, Math.min(maxX, x));
  goalie.style.left = goalieX + "px";
}

// 🎮 SCROLL CONTROL
window.addEventListener("wheel", (e) => {
  const speed = 25;

  if (e.deltaY > 0) goalieX -= speed;
  else goalieX += speed;

  moveGoalie(goalieX);
});

// ⚽ BALL MOVEMENT (THIS WAS MISSING BEFORE)
function shootBall() {
  if (!gameActive) return;

  const goalRect = getGoalBounds();

  let x = window.innerWidth / 2;
  let y = window.innerHeight - 60;

  ball.style.opacity = "1";

  const minX = goalRect.left + 10;
  const maxX = goalRect.right - 10;
  const targetX = minX + Math.random() * (maxX - minX);

  let speedY = 28;
  let speedX = (targetX - x) / 60;

  const interval = setInterval(() => {

    y -= speedY;
    x += speedX;

    ball.style.top = y + "px";
    ball.style.left = x + "px";

    const ballRect = ball.getBoundingClientRect();
    const goalieRect = goalie.getBoundingClientRect();

    const goalieFeetLine = goalieRect.bottom;
    const beforeFeet = ballRect.bottom < goalieFeetLine;

    const touching =
      ballRect.left < goalieRect.right &&
      ballRect.right > goalieRect.left;

    // 🧤 SAVE RULE
    if (beforeFeet && touching) {
      clearInterval(interval);

      saves++;
      counterText.textContent = `Saves: ${saves}/3`;

      ball.style.opacity = "0";

      if (saves >= 3) {
        gameActive = false;
        message.textContent = "🎉 Happy Birthday, Fiks!";
      }

      setTimeout(shootBall, 900);
      return;
    }

    // ❌ miss
    if (y <= goalRect.top) {
      clearInterval(interval);
      ball.style.opacity = "0";
      setTimeout(shootBall, 900);
    }

  }, 20);
}

// 🧠 INIT GAME
window.onload = () => {
  const bounds = getGoalBounds();
  goalieX = (bounds.left + bounds.right) / 2;
  moveGoalie(goalieX);

  shootBall(); // 🔥 THIS FIXES YOUR ISSUE
};

</script>

</body>
</html>
