<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: fixed;
  touch-action: none;
  font-family: Arial;
  background: #0b6623;
}

.goal {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 160px;
  border: 4px solid white;

  background-image:
    linear-gradient(to right, rgba(255,255,255,0.2) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.2) 1px, transparent 1px);

  background-size: 20px 20px;
}

#goalie {
  position: absolute;
  top: 70px;
  width: 168px;
  transform: translateX(-50%);
}

#ball {
  position: absolute;
  width: 35px;
  height: 35px;
}

#message {
  position: absolute;
  top: 200px;
  width: 100%;
  text-align: center;
  font-size: 36px;
  color: white;
  z-index: 20;
}

#counter {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 22px;
  color: white;
  z-index: 20;
}

#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#instructions {
  color: white;
  font-size: 22px;
  text-align: center;
  max-width: 600px;
  margin: 20px;
  line-height: 1.5;
}

#startBtn, #restartBtn {
  padding: 12px 24px;
  font-size: 18px;
  cursor: pointer;
  margin-top: 10px;
}

.confetti {
  position: absolute;
  width: 18px;
  height: 18px;
  top: -30px;
  opacity: 0.9;
  z-index: 999;
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 50%,
    75% 100%,
    25% 100%,
    0% 50%
  );
}
</style>
</head>

<body>

<div id="startScreen">

  <h1 style="color:white;">Soccer Save Game</h1>

  <p id="instructions">
    Move your mouse left and right to block soccer ball.
  </p>

  <button id="startBtn">Start Game</button>

</div>

<div class="goal"></div>

<img id="goalie" src="goalie.png">

<img id="ball"
src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

<div id="message"></div>

<div id="counter">Saves: 0/3</div>

<button id="restartBtn" style="
position:absolute;
top:260px;
left:50%;
transform:translateX(-50%);
display:none;
z-index:20;
">
Start Over
</button>

<script>

const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const goal = document.querySelector(".goal");
const counterText = document.getElementById("counter");
const message = document.getElementById("message");
const restartBtn = document.getElementById("restartBtn");

let saves = 0;
let gameActive = false;
let goalieX = window.innerWidth / 2;

// 🧠 GOAL BOUNDS
function getGoalBounds() {
  return goal.getBoundingClientRect();
}

// 🧤 MOUSE CONTROL
window.addEventListener("mousemove", (e) => {

  if (!gameActive) return;

  const bounds = getGoalBounds();

  const goalieWidth = goalie.offsetWidth;

  const minX = bounds.left + goalieWidth / 2;

  const maxX = bounds.right - goalieWidth / 2;

  let x = e.clientX;

  goalieX = Math.max(minX, Math.min(maxX, x));

  goalie.style.left = goalieX + "px";

});

// ⚽ RESET BALL
function resetBall() {

  ball.style.opacity = "0";

  ball.style.left = window.innerWidth / 2 + "px";

  ball.style.top = window.innerHeight - 60 + "px";

}

// 🧤 HITBOX
function checkGoalieHit(ballRect, goalieRect) {

  const paddingX = goalieRect.width * 0.25;

  const paddingY = goalieRect.height * 0.35;

  const hitbox = {
    left: goalieRect.left + paddingX,
    right: goalieRect.right - paddingX,
    top: goalieRect.top + paddingY,
    bottom: goalieRect.bottom
  };

  return (
    ballRect.right > hitbox.left &&
    ballRect.left < hitbox.right &&
    ballRect.bottom > hitbox.top &&
    ballRect.top < hitbox.bottom
  );
}

// 🎉 HEXAGON CONFETTI
function launchConfetti() {

  for (let i = 0; i < 120; i++) {

    const confetti = document.createElement("div");

    confetti.classList.add("confetti");

    // ⚫⚪ BLACK OR WHITE
    const colors = ["black", "white"];

    confetti.style.background =
      colors[Math.floor(Math.random() * colors.length)];

    confetti.style.left =
      Math.random() * window.innerWidth + "px";

    confetti.style.transform =
      `rotate(${Math.random() * 360}deg)`;

    document.body.appendChild(confetti);

    let y = -30;

    let xDrift = (Math.random() - 0.5) * 4;

    let speed =
      Math.random() * 4 + 2;

    let rotation =
      Math.random() * 8;

    const fall = setInterval(() => {

      y += speed;

      let currentLeft =
        parseFloat(confetti.style.left);

      currentLeft += xDrift;

      confetti.style.top = y + "px";

      confetti.style.left = currentLeft + "px";

      confetti.style.transform =
        `rotate(${y * rotation}deg)`;

      if (y > window.innerHeight + 40) {

        clearInterval(fall);

        confetti.remove();

      }

    }, 20);

  }

}

// ⚽ SHOOT BALL
function shootBall() {

  if (!gameActive) return;

  const goalRect = getGoalBounds();

  const startZones = [
    window.innerWidth * 0.2,
    window.innerWidth * 0.5,
    window.innerWidth * 0.8
  ];

  let x =
    startZones[Math.floor(Math.random() * startZones.length)];

  let y = window.innerHeight - 60;

  ball.style.opacity = "1";

  const targetX =
    goalRect.left + 20 +
    Math.random() * (goalRect.width - 40);

  let curve = (Math.random() * 0.6 + 0.4);

  let direction = targetX > x ? 1 : -1;

  let velocityX = 0;

  const interval = setInterval(() => {

    velocityX += direction * curve * 0.2;

    x += velocityX;

    y -= window.innerHeight * 0.015;

    ball.style.top = y + "px";

    ball.style.left = x + "px";

    const ballRect = ball.getBoundingClientRect();

    const goalieRect = goalie.getBoundingClientRect();

    // 🧤 SAVE
    if (checkGoalieHit(ballRect, goalieRect)) {

      clearInterval(interval);

      saves++;

      counterText.textContent =
        `Saves: ${saves}/3`;

      // 🏆 WIN
      if (saves >= 3) {

        gameActive = false;

        message.textContent =
          "🎉 Happy Birthday, Fiks!";

        restartBtn.style.display = "block";

        launchConfetti();

        return;
      }

      ball.style.opacity = "0";

      setTimeout(shootBall, 800);

      return;
    }

    // ❌ MISS
    if (y <= goalRect.top) {

      clearInterval(interval);

      ball.style.opacity = "0";

      setTimeout(shootBall, 800);

    }

  }, 20);

}

// ▶ START GAME
startBtn.addEventListener("click", () => {

  startScreen.style.display = "none";

  saves = 0;

  gameActive = true;

  counterText.textContent = "Saves: 0/3";

  message.textContent = "";

  restartBtn.style.display = "none";

  resetBall();

  setTimeout(() => shootBall(), 500);

});

// 🔄 RESTART
restartBtn.addEventListener("click", () => {

  gameActive = false;

  startScreen.style.display = "flex";

  saves = 0;

  counterText.textContent = "Saves: 0/3";

  message.textContent = "";

  restartBtn.style.display = "none";

  resetBall();

});

// 🧠 INIT
window.onload = () => {

  resetBall();

};

</script>

</body>
</html>
