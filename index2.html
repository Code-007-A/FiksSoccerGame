<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soccer Goalie Block Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0b6623;
        font-family: Arial, sans-serif;
    }

    #field {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(#0b6623, #0a5a1f);
    }

    #goal {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 675px;
        height: 120px;
        border: 4px solid white;
        border-bottom: none;
        background-image:
            repeating-linear-gradient(0deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 1px, transparent 1px, transparent 10px),
            repeating-linear-gradient(90deg, rgba(255,255,255,0.15) 0px, rgba(255,255,255,0.15) 1px, transparent 1px, transparent 10px);
        background-size: 10px 10px;
    }

    #goalie {
        position: absolute;
        bottom: 120px;
        width: 40px;
        height: 70px;
        left: 0;
    }

    #goalie::before {
        content: "";
        position: absolute;
        top: 0;
        left: 10px;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
    }

    #goalie::after {
        content: "";
        position: absolute;
        top: 20px;
        left: 16px;
        width: 8px;
        height: 30px;
        background: white;
    }

    #goalie span {
        position: absolute;
        top: 28px;
        left: 0;
        width: 40px;
        height: 6px;
        background: white;
    }

    #ball {
        position: absolute;
        width: 25px;
        height: 25px;
        background: white;
        border-radius: 50%;
    }

    #message {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 40px;
        color: white;
        display: none;
    }

    #score {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 20px;
    }
</style>
</head>
<body>

<div id="field">
    <div id="goal"></div>
    <div id="goalie"><span></span></div>
    <div id="ball"></div>
    <div id="message">You Win! 🏆</div>
    <div id="score"></div>
</div>

<script>
const field = document.getElementById("field");
const goal = document.getElementById("goal");
const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const message = document.getElementById("message");
const scoreDisplay = document.getElementById("score");

let fieldWidth = field.clientWidth;
const goalieWidth = 40;
let goalieX = fieldWidth / 2;

let ballX = 0;
let ballY = 0;
let dx = 0;
let dy = 0;

let saves = 0;
let gameOver = false;
let state = "shoot";

function updateScore() {
    scoreDisplay.textContent = saves + " / 3 Saves";
}
updateScore();

function getGoalBounds() {
    const center = field.clientWidth / 2;
    const width = 675;
    return {
        left: center - width / 2,
        right: center + width / 2
    };
}

// control
document.addEventListener("wheel", (e) => {
    if (gameOver) return;

    e.preventDefault();

    if (e.deltaY > 0) goalieX -= 30;
    else goalieX += 30;

    goalieX = Math.max(0, Math.min(fieldWidth - goalieWidth, goalieX));
    goalie.style.left = goalieX + "px";
}, { passive: false });

window.addEventListener("resize", () => {
    fieldWidth = field.clientWidth;
});

function spawnBall() {
    const bounds = getGoalBounds();

    const margin = 30; // keeps ball safely inside posts

    ballX = bounds.left + margin + Math.random() * (bounds.right - bounds.left - margin * 2 - 25);
    ballY = 0;

    dx = (Math.random() - 0.5) * 3;
    dy = 3 + Math.random() * 2;

    state = "shoot";

    ball.style.left = ballX + "px";
    ball.style.top = ballY + "px";
}

function resolveSave() {
    if (state !== "shoot" || gameOver) return;

    state = "saved";

    saves++;
    updateScore();

    message.textContent = "Great Save! 🧤";
    message.style.display = "block";

    setTimeout(() => {
        if (!gameOver) message.style.display = "none";
    }, 1000);

    dy = -(3 + Math.random() * 2);
    dx = (Math.random() - 0.5) * 3;

    if (saves === 3) {
        gameOver = true;
        message.textContent = "You Win! 🏆";
    }
}

function resolveMiss() {
    if (state !== "shoot" || gameOver) return;

    state = "missed";

    message.textContent = "Missed! ⚽";
    message.style.display = "block";

    setTimeout(() => {
        if (!gameOver) spawnBall();
    }, 500);
}

function update() {
    if (gameOver) return;

    const goalieRect = goalie.getBoundingClientRect();
    const ballRect = ball.getBoundingClientRect();
    const bounds = getGoalBounds();

    ballX += dx;
    ballY += dy;

    // STRICT WALLS: always stay inside goal
    if (ballX <= bounds.left) {
        ballX = bounds.left;
        dx = Math.abs(dx); // force right
    }
    if (ballX >= bounds.right - 25) {
        ballX = bounds.right - 25;
        dx = -Math.abs(dx); // force left
    }

    ball.style.left = ballX + "px";
    ball.style.top = ballY + "px";

    if (state === "shoot" &&
        ballRect.bottom >= goalieRect.top &&
        ballRect.left < goalieRect.right &&
        ballRect.right > goalieRect.left
    ) {
        resolveSave();
    }

    if (state === "shoot" && ballY > window.innerHeight) {
        resolveMiss();
    }

    if (state === "saved" && ballY < -50) {
        spawnBall();
    }

    requestAnimationFrame(update);
}

spawnBall();
update();
</script>

</body>
</html>
