<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
  
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: fixed;
  touch-action: none;
  font-family: Arial;
  background: #0b6623;
}

.goal {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 160px;
  border: 4px solid white;

  /* 🧵 NET TEXTURE */
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.25) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.25) 1px, transparent 1px);

  background-size: 20px 20px;
}

#goalie {
  position: absolute;
  top: 70px;
  width: 168px;
  transform: translateX(-50%);
}

#ball {
  position: absolute;
  width: 35px;
  height: 35px;
}

#message {
  position: absolute;
  top: 200px;
  width: 100%;
  text-align: center;
  font-size: 36px;
  color: white;

  animation: flicker 0.2s infinite;
}

#counter {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 22px;
  color: white;
}

#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#instructions {
  color: white;
  font-size: 22px;
  text-align: center;
  max-width: 600px;
  margin: 20px;
}

#restartBtn {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 12px 24px;
  font-size: 18px;
  cursor: pointer;
  display: none;
  z-index: 200;
}

.confetti {
  position: absolute;
  width: 50px;
  height: 50px;
  top: -30px;
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 50%,
    75% 100%,
    25% 100%,
    0% 50%
  );
}


@keyframes flicker {
  0%   { opacity: 1; }
  25%  { opacity: 0; }
  50%  { opacity: 1; }
  75%  { opacity: 0; }
  100% { opacity: 1; }
}


  
</style>
</head>

<body>

<div id="startScreen">
  <h1 style="color:white;">Fik's Soccer Game</h1>

  <p id="instructions">
    Move your mouse left and right to block soccer ball.
  </p>

  <button id="startBtn">Start Game</button>
</div>

<div class="goal"></div>

<img id="goalie" src="goalie.png">
<img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

<div id="message"></div>
<div id="counter">Saves: 0/3</div>

<button id="restartBtn" style="display:none;">Start Over</button>

<script>

/* soundFX*/
const saveSound = new Audio("sound01.mp3");
saveSound.volume = 1.0;

  

const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const goal = document.querySelector(".goal");
const counterText = document.getElementById("counter");
const message = document.getElementById("message");
const restartBtn = document.getElementById("restartBtn");

let saves = 0;
let gameActive = false;
let goalieX = window.innerWidth / 2;

let jumpAnim = null;

// 🧠 GOAL BOUNDS
function getGoalBounds() {
  return goal.getBoundingClientRect();
}

// 🧤 MOUSE CONTROL
window.addEventListener("mousemove", (e) => {
  if (!gameActive) return;

  const bounds = getGoalBounds();
  const goalieWidth = goalie.offsetWidth;

  const minX = bounds.left + goalieWidth / 2;
  const maxX = bounds.right - goalieWidth / 2;

  let x = e.clientX;

  goalieX = Math.max(minX, Math.min(maxX, x));

  goalie.style.left = goalieX + "px";
});

// ⚽ RESET BALL
function resetBall() {
  ball.style.opacity = "0";
  ball.style.left = window.innerWidth / 2 + "px";
  ball.style.top = window.innerHeight - 60 + "px";
}

// 🧤 HIT DETECTION
function checkGoalieHit(ballRect, goalieRect) {

  // ⚽ BALL center point (more accurate than edges)
  const ballCenterX = (ballRect.left + ballRect.right) / 2;
  const ballCenterY = (ballRect.top + ballRect.bottom) / 2;

  // 🧤 STRICT GOALIE HITBOX (no padding cheating)
  const hit =
    ballCenterX > goalieRect.left &&
    ballCenterX < goalieRect.right &&
    ballCenterY > goalieRect.top &&
    ballCenterY < goalieRect.bottom;

  return hit;

/* save soundFX */
saveSound.currentTime = 0;
saveSound.play();

// ⏱ stop after 0.25s
setTimeout(() => {
  saveSound.pause();
}, 250);


  
}

// 🧤 JUMP ANIMATION
function startJump() {
  if (jumpAnim) return;

  jumpAnim = setInterval(() => {
    goalie.src =
      goalie.src.includes("goalie.png")
        ? "jump.png"
        : "goalie.png";
  }, 400);
}

function stopJump() {
  clearInterval(jumpAnim);
  jumpAnim = null;
  goalie.src = "goalie.png";
}

// 🎉 CONFETTI
function launchConfetti() {
  for (let i = 0; i < 120; i++) {

    const c = document.createElement("div");
    c.classList.add("confetti");

    c.style.background = Math.random() > 0.5 ? "black" : "white";
    c.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(c);

    let y = -30;
    let x = parseFloat(c.style.left);

    let drift = (Math.random() - 0.5) * 4;
    let speed = Math.random() * 4 + 2;

    const fall = setInterval(() => {
      y += speed;
      x += drift;

      c.style.top = y + "px";
      c.style.left = x + "px";

      if (y > window.innerHeight) {
        clearInterval(fall);
        c.remove();
      }
    }, 20);
  }
}

// ⚽ SHOOT BALL (FIXED)
function shootBall() {

  if (!gameActive) return;

  const goalRect = getGoalBounds();

  let x = window.innerWidth * (0.2 + Math.random() * 0.6);
  let y = window.innerHeight - 60;

  ball.style.opacity = "1";

  const targetX = goalRect.left + Math.random() * goalRect.width;

  let velocityX = 0;
  let speedY = window.innerHeight * 0.018; // ✅ FIXED SCALE SPEED

  const interval = setInterval(() => {

    velocityX += (targetX > x ? 1 : -1) * 0.3;

    x += velocityX;
    y -= speedY; // ✅ now always reaches goal properly

    ball.style.left = x + "px";
    ball.style.top = y + "px";

    const ballRect = ball.getBoundingClientRect();
    const goalieRect = goalie.getBoundingClientRect();

    // SAVE
    if (checkGoalieHit(ballRect, goalieRect)) {

      clearInterval(interval);

      saves++;
      counterText.textContent = `Saves: ${saves}/3`;

      if (saves >= 3) {

        gameActive = false;
        message.textContent = " You WIN!!! and Happy Birthday, Fiks!";
        restartBtn.style.display = "block";

        startJump();
        launchConfetti();

        return;
      }

      ball.style.opacity = "0";
      setTimeout(shootBall, 700);
      return;
    }

    // MISS
    if (y <= goalRect.top - 50) { // ✅ ensures it fully passes goal
      clearInterval(interval);
      ball.style.opacity = "0";
      setTimeout(shootBall, 700);
    }

  }, 16);
}

// ▶ START
startBtn.onclick = () => {
  startScreen.style.display = "none";
  saves = 0;
  gameActive = true;
  counterText.textContent = "Saves: 0/3";
  message.textContent = "";
  restartBtn.style.display = "none";
  resetBall();
  shootBall();
};

// 🔄 RESTART
restartBtn.onclick = () => {
  gameActive = false;
  startScreen.style.display = "flex";
  saves = 0;
  counterText.textContent = "Saves: 0/3";
  message.textContent = "";
  restartBtn.style.display = "none";
  stopJump();
  resetBall();
};

// INIT
window.onload = resetBall;

</script>

</body>
</html>
