<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soccer Goalie Block Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0b6623;
        font-family: Arial, sans-serif;
    }

    #field {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(#0b6623, #0a5a1f);
    }

    #goal {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 100px;
        border: 4px solid white;
        border-bottom: none;
    }

    #goalie {
        position: absolute;
        bottom: 120px;
        width: 80px;
        height: 20px;
        background: white;
        border-radius: 10px;
    }

    .ball {
        position: absolute;
        width: 25px;
        height: 25px;
        background: white;
        border-radius: 50%;
    }

    #message {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 40px;
        color: white;
        display: none;
    }
</style>
</head>
<body>

<div id="field">
    <div id="goal"></div>
    <div id="goalie"></div>
    <div id="message">Congratulations! You Won 🎉</div>
</div>

<script>
const field = document.getElementById("field");
const goalie = document.getElementById("goalie");
const message = document.getElementById("message");

let gameOver = false;

let fieldWidth = field.clientWidth;
const goalieWidth = 80;
let goalieX = fieldWidth / 2 - goalieWidth / 2;

goalie.style.left = goalieX + "px";

window.addEventListener("resize", () => {
    fieldWidth = field.clientWidth;
    goalieX = Math.max(0, Math.min(fieldWidth - goalieWidth, goalieX));
    goalie.style.left = goalieX + "px";
});

// mouse wheel control (kept)
document.addEventListener("wheel", (e) => {
    if (gameOver) return;

    e.preventDefault();

    if (e.deltaY > 0) goalieX -= 30;
    else goalieX += 30;

    goalieX = Math.max(0, Math.min(fieldWidth - goalieWidth, goalieX));
    goalie.style.left = goalieX + "px";
}, { passive: false });

// BALL SYSTEM
let balls = [];

function spawnBall() {
    if (gameOver) return;

    const ball = document.createElement("div");
    ball.classList.add("ball");
    field.appendChild(ball);

    const startX = Math.random() * (fieldWidth - 30);

    balls.push({
        el: ball,
        x: startX,
        y: 0,
        dx: (Math.random() - 0.5) * 3,
        dy: 3 + Math.random() * 2
    });
}

setInterval(spawnBall, 500);

function update() {
    if (gameOver) return;

    const goalieRect = goalie.getBoundingClientRect();

    balls.forEach((b, index) => {
        b.x += b.dx;
        b.y += b.dy;

        // slight curve change
        b.dx += (Math.random() - 0.5) * 0.2;
        b.dx = Math.max(-4, Math.min(4, b.dx));

        b.el.style.left = b.x + "px";
        b.el.style.top = b.y + "px";

        const ballRect = b.el.getBoundingClientRect();

        // collision with goalie
        if (
            ballRect.bottom >= goalieRect.top &&
            ballRect.left < goalieRect.right &&
            ballRect.right > goalieRect.left
        ) {
            gameOver = true;
            message.style.display = "block";
        }

        // remove if off screen
        if (b.y > window.innerHeight) {
            b.el.remove();
            balls.splice(index, 1);
        }
    });

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
