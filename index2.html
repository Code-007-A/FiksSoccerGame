<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soccer Save Game</title>

<style>
  body {
    margin: 0;
    background: #0b6623;
    overflow: hidden;
    font-family: Arial;
  }

  .goal {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 160px;
    border: 4px solid white;
  }

  #goalie {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
  }

  #ball {
    position: absolute;
    width: 35px;
    height: 35px;
  }

  #message {
    position: absolute;
    top: 200px;
    width: 100%;
    text-align: center;
    font-size: 32px;
    color: white;
  }

  #counter {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 22px;
    color: white;
  }
</style>
</head>

<body>

<div class="goal"></div>

<img id="goalie" src="goalie.png" alt="Goalie">
<img id="ball" src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg">

<div id="message"></div>
<div id="counter">Saves: 0</div>

<script>

const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const message = document.getElementById("message");
const counterText = document.getElementById("counter");

let saves = 0;
let gameActive = true;
let messageTimer = null;

// move goalie with mouse
document.addEventListener("mousemove", (e) => {
  let x = e.clientX;

  const min = 80;
  const max = window.innerWidth - 80;

  if (x < min) x = min;
  if (x > max) x = max;

  goalie.style.left = x + "px";
});

// get goal bounds
function getGoal() {
  return document.querySelector(".goal").getBoundingClientRect();
}

// show SAVED message (1 second only)
function showSaveMessage() {
  message.textContent = "🧤 SAVED";

  clearTimeout(messageTimer);
  messageTimer = setTimeout(() => {
    message.textContent = "";
  }, 1000);
}

// BALL SHOOT (FORCED INSIDE GOAL)
function shootBall() {
  if (!gameActive) return;

  const goal = getGoal();

  let x = window.innerWidth / 2;
  let y = window.innerHeight - 60;

  ball.style.left = x + "px";
  ball.style.top = y + "px";
  ball.style.opacity = "1";

  // 🔒 STRICT RULE: ALWAYS inside goal posts
  const padding = 20; // keeps ball safely inside posts
  const minX = goal.left + padding;
  const maxX = goal.right - padding;

  const targetX = minX + Math.random() * (maxX - minX);

  let speedY = 7;
  let speedX = (targetX - x) / 60;

  const interval = setInterval(() => {

    y -= speedY;
    x += speedX;

    ball.style.top = y + "px";
    ball.style.left = x + "px";

    const goalieRect = goalie.getBoundingClientRect();
    const ballRect = ball.getBoundingClientRect();

    // SAVE DETECTION
    const save =
      ballRect.top <= goalieRect.bottom &&
      ballRect.left < goalieRect.right &&
      ballRect.right > goalieRect.left;

    if (save) {
      clearInterval(interval);

      saves++;
      counterText.textContent = "Saves: " + saves;

      showSaveMessage();

      // reflect + disappear
      ball.style.top = (y + 80) + "px";

      setTimeout(() => {
        ball.style.opacity = "0";
      }, 200);

      checkWin();

      setTimeout(shootBall, 900);
      return;
    }

    // reached goal line (always inside now = goal guaranteed if not saved)
    if (y <= goal.top) {
      clearInterval(interval);

      ball.style.opacity = "0";

      setTimeout(shootBall, 900);
    }

  }, 20);
}

// win condition
function checkWin() {
  if (saves >= 3) {
    gameActive = false;
    message.textContent = "🎉 Happy Birthday, Fiks!";
  }
}

// start
shootBall();

</script>

</body>
</html>
