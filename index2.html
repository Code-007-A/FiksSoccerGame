<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Soccer Goalie Block Game</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0b6623;
        font-family: Arial, sans-serif;
    }

    #field {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(#0b6623, #0a5a1f);
    }

    #goal {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 100px;
        border: 4px solid white;
        border-bottom: none;
    }

    #goalie {
        position: absolute;
        bottom: 120px;
        width: 80px;
        height: 20px;
        background: white;
        border-radius: 10px;
    }

    #ball {
        position: absolute;
        top: 50px;
        left: 50%;
        width: 25px;
        height: 25px;
        background: white;
        border-radius: 50%;
    }

    #message {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 40px;
        color: white;
        display: none;
    }
</style>
</head>
<body>

<div id="field">
    <div id="goal"></div>
    <div id="goalie"></div>
    <div id="ball"></div>
    <div id="message">Congratulations! You Won 🎉</div>
</div>

<script>
const field = document.getElementById("field");
const goalie = document.getElementById("goalie");
const ball = document.getElementById("ball");
const message = document.getElementById("message");

let gameOver = false;

let fieldWidth = field.clientWidth;
const goalieWidth = 80;
let goalieX = fieldWidth / 2 - goalieWidth / 2;

let ballY = 50;

// initial positions
goalie.style.left = goalieX + "px";
ball.style.left = fieldWidth / 2 + "px";

// responsive resize
window.addEventListener("resize", () => {
    fieldWidth = field.clientWidth;
    goalieX = Math.max(0, Math.min(fieldWidth - goalieWidth, goalieX));
    goalie.style.left = goalieX + "px";
});

// WHEEL CONTROLS (NEW)
document.addEventListener("wheel", (e) => {
    if (gameOver) return;

    e.preventDefault(); // stop page scroll

    // scroll down = left, scroll up = right
    if (e.deltaY > 0) {
        goalieX -= 30;
    } else {
        goalieX += 30;
    }

    goalieX = Math.max(0, Math.min(fieldWidth - goalieWidth, goalieX));
    goalie.style.left = goalieX + "px";
}, { passive: false });

// ball movement
function updateBall() {
    if (gameOver) return;

    ballY += 4;
    ball.style.top = ballY + "px";

    const goalieRect = goalie.getBoundingClientRect();
    const ballRect = ball.getBoundingClientRect();

    if (
        ballRect.bottom >= goalieRect.top &&
        ballRect.left < goalieRect.right &&
        ballRect.right > goalieRect.left
    ) {
        gameOver = true;
        message.style.display = "block";
    }

    if (ballY > window.innerHeight) {
        ballY = 50;
    }

    requestAnimationFrame(updateBall);
}

updateBall();
</script>

</body>
</html>
